name: datedash
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.2+2

environment:
  sdk: ^3.5.0

dependencies:
  cloud_firestore: 4.14.0
  firebase_auth: 4.16.0
  firebase_core: 2.24.2
  flutter:
    sdk: flutter
  google_sign_in: 6.1.5
  shared_preferences: ^2.2.2
  http: ^1.2.0
  iconsax: ^0.0.8
  image_picker: 1.0.4
  provider: ^6.1.1
  geolocator: 10.1.0
  sqflite: ^2.3.0
  path: ^1.8.0
  connectivity_plus: ^5.0.0
  emoji_picker_flutter: ^1.6.3
  giphy_get: ^3.6.0
  http_parser: ^4.0.2
  path_provider: ^2.1.5
  image_cropper: ^5.0.0
  record: ^6.2.0
  audioplayers: ^6.4.0
  url_launcher: ^6.3.1
  flutter_ringtone_player: ^4.0.0+4
  flutter_svg: ^2.1.0
  package_info_plus: ^9.0.1
  dio: ^5.9.2
  open_file: ^3.5.11
  permission_handler: ^12.0.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
