name: datedash
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  cloud_firestore: 4.14.0
  firebase_auth: 4.16.0
  firebase_core: 2.24.2
  flutter:
    sdk: flutter
  google_sign_in: 6.1.5
  http: ^1.2.0
  iconsax: ^0.0.8
  image_picker: 1.0.4
  provider: ^6.1.1
  geolocator: 10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
