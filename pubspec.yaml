name: datedash
description: "A new Flutter project."
publish_to: 'none'
version: 1.2.0+4

environment:
  sdk: ^3.5.0

dependencies:
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  flutter:
    sdk: flutter
  google_sign_in: ^6.2.1
  shared_preferences: ^2.2.2
  http: ^1.2.0
  iconsax: ^0.0.8
  image_picker: ^1.1.0
  provider: ^6.1.1
  geolocator: ^14.0.1
  sqflite: ^2.3.0
  path: ^1.8.0
  connectivity_plus: ^6.1.5
  emoji_picker_flutter: ^4.4.0
  giphy_get: ^3.6.0
  http_parser: ^4.0.2
  path_provider: ^2.1.5
  image_cropper: ^8.1.0
  record: ^6.2.0
  audioplayers: ^5.2.1
  url_launcher: ^6.3.1
  flutter_ringtone_player: ^4.0.0+4
  flutter_svg: ^2.1.0
  package_info_plus: ^8.1.0
  dio: ^5.9.2
  open_file: ^3.5.11
  permission_handler: ^11.3.1
  intl: ^0.19.0
  wakelock_plus: ^1.2.10
  intl_phone_field: ^3.2.0
  local_auth: ^2.3.0
  firebase_messaging: ^16.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  geolocator_android: 4.6.1
  record_android: 1.2.0
  image_cropper_platform_interface: 6.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audios/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
